name: 'AI Code Quality Gate'

on:
  pull_request:
    branches: [ "main" ]
    types: [opened, synchronize]

jobs:
  ai-review:
    name: 'Execute Professional AI Review'
    runs-on: ubuntu-latest
    
    # PR par comment karne ke liye permissions
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4

      - name: 'Login to Azure Container Registry'
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: 'Run AI Reviewer Container'
        env:
          # In env variables ka naam wahi rakhein jo Python script mein hai
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Image pull karein aur run karein
          docker pull ${{ secrets.ACR_LOGIN_SERVER }}/ai-reviewer:v1.0.18
          docker run --rm \
            -e GITHUB_TOKEN=$GITHUB_TOKEN \
            -e GITHUB_REPOSITORY=$GITHUB_REPOSITORY \
            -e PR_NUMBER=$PR_NUMBER \
            -e AZURE_OPENAI_KEY=$AZURE_OPENAI_KEY \
            -e AZURE_OPENAI_ENDPOINT=$AZURE_OPENAI_ENDPOINT \
            ${{ secrets.ACR_LOGIN_SERVER }}/ai-reviewer:v1.0.18