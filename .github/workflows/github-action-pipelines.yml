name: 'AI Code Quality Gate'

on:
  pull_request:
    branches: [ "main" ]
    types: [opened, synchronize]

jobs:
  ai-review:
    name: 'Execute Professional AI Review'
    runs-on: ubuntu-latest
    
    # PR par comment karne ke liye permissions
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4

      - name: 'Login to Azure Container Registry'
        uses: azure/docker-login@v1
        with:
          login-server: ${{ vars.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # Professional Practice: Build with SHA for Immutability
      - name: 'Build and Push Docker Image'
        id: build_image
        run: |
          # SHA based tagging (Professional Standard)
          IMAGE_TAG=${{ github.sha }}
          REGISTRY=${{ vars.ACR_LOGIN_SERVER }}
          IMAGE_NAME=$REGISTRY/ai-reviewer:$IMAGE_TAG
          
          echo "Building $IMAGE_NAME..."
          docker build -t $IMAGE_NAME .
          
          echo "Pushing to ACR..."
          docker push $IMAGE_NAME
          
          # Storing for next step
          echo "IMAGE_FULL_PATH=$IMAGE_NAME" >> $GITHUB_ENV

      - name: 'Run AI Reviewer'
        env:
          # Injected from GitHub Secrets
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT_NAME: ${{vars.AZURE_OPENAI_DEPLOYMENT_NAME }}
          # Contextual Info
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "Executing review using image: ${{ env.IMAGE_FULL_PATH }}"
          docker run --rm \
            -e GITHUB_TOKEN=$GITHUB_TOKEN \
            -e GITHUB_REPOSITORY=$GITHUB_REPOSITORY \
            -e PR_NUMBER=$PR_NUMBER \
            -e AZURE_OPENAI_KEY=$AZURE_OPENAI_KEY \
            -e AZURE_OPENAI_ENDPOINT=$AZURE_OPENAI_ENDPOINT \
            -e AZURE_OPENAI_DEPLOYMENT_NAME=$AZURE_OPENAI_DEPLOYMENT_NAME \
            ${{ env.IMAGE_FULL_PATH }}
